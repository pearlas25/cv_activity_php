<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CV Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1 class="header-title">CV Builder</h1>
            <p class="header-subtitle">Create your professional CV in a snap.</p>
        </header>

        <section class="form-section">
            <form action="cv_builder.php" method="POST" enctype="multipart/form-data">
                <div class="section-block">
                    <h2>Profile Picture</h2>
                    <input type="file" name="profile_pic" accept="image/*">
                </div>

                <div class="section-block">
                    <h2>Basic Information</h2>
                    <div class="input-flex">
                        <input type="text" name="first_name" placeholder="First Name" required>
                        <input type="text" name="last_name" placeholder="Last Name" required>
                    </div>
                    <input type="text" name="job_title" placeholder="Job Title">
                    <div class="input-flex">
                        <input type="email" name="email" placeholder="Email Address" required>
                        <input type="tel" name="phone" placeholder="Phone Number">
                    </div>
                    <input type="text" name="address" placeholder="Address">
                </div>

                <div class="section-block">
                    <h2>Professional Summary</h2>
                    <textarea name="summary" placeholder="About Me..."></textarea>
                </div>

                <div class="section-block">
                    <h2>Experience & Education</h2>
                    <p style="font-size: 0.8em; color: #888;">Format: Company|Title|Location|Date|Description</p>
                    <div class="input-flex">
                        <textarea name="experience" placeholder="Work Exp (use | to separate fields)"></textarea>
                        <textarea name="education" placeholder="Education (use | to separate fields)"></textarea>
                    </div>
                </div>

                <div class="section-block">
                    <h2>Skills (comma separated)</h2>
                    <textarea name="skills" placeholder="Design, Management, Coding..."></textarea>
                </div>

                <div class="center-btn">
                    <button type="submit" class="generate-btn">Generate My CV</button>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
